<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
<title id="title">Resevo technical architecture</title><desc id="desc">Agent to CLI or MCP, shared core, local evidence services, candidate gate, then human promotion.</desc>
<rect width="1600" height="720" fill="#F5F7FA"/><text x="80" y="80" font-family="Arial" font-size="42" font-weight="700" fill="#17212B">Resevo technical architecture</text>
<g font-family="Arial" text-anchor="middle" fill="#17212B"><rect x="60" y="250" width="220" height="110" rx="8" fill="#fff" stroke="#253746"/><text x="170" y="300" font-size="25" font-weight="700">External Agent</text><text x="170" y="334" font-size="18">Codex / Claude</text>
<rect x="340" y="210" width="220" height="80" rx="8" fill="#fff" stroke="#253746"/><text x="450" y="260" font-size="24">Resevo CLI</text><rect x="340" y="325" width="220" height="80" rx="8" fill="#fff" stroke="#253746"/><text x="450" y="375" font-size="24">stdio MCP</text>
<rect x="630" y="250" width="220" height="110" rx="8" fill="#fff" stroke="#253746"/><text x="740" y="310" font-size="27" font-weight="700">Shared core</text>
